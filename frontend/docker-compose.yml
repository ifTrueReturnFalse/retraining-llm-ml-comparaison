#version: '3.8'

services:
  postgres:
    image: postgres:14.18
    container_name: dev-ia-p12-postgres
    environment:
      POSTGRES_DB: dev_ia_p12
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: